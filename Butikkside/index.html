<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Premium Store</title>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- bakgrunnsglød -->
    <div class="ambient-glow"></div>

    <!-- innlogging -->
    <div id="innlogging" class="auth-wrapper" >
        <div class="glass-card login-boks">
            <h1 class="brand-title">AURA<span>.</span></h1>
            <p class="subtitle">Logg inn for å oppleve fremtiden.</p>
            
            <div class="input-group">
                <input type="email" id="epost" placeholder="E-post">
            </div>
            <div class="input-group">
                <input type="password" id="passord" placeholder="Passord">
            </div>
            
            <button id="logg-inn-knapp" class="btn-primary">Logg inn</button>
            <button id="registrer-knapp" class="btn-secondary">Opprett konto</button>
            
            <p id="feilmelding" class="error-msg"></p>
        </div>
    </div>

    <!-- butikk-layout (skjult først) -->
    <div id="butikk" class="skjult layout">
        <header class="glass-header">
            <div class="logo">AURA<span>.</span></div>
            <nav>
                <a href="#">Butikk</a>
                <a href="#">Kolleksjoner</a>
            </nav>
            <button id="logg-ut-knapp" class="btn-outline">Logg ut</button>
        </header>

        <main>
            <section class="hero">
                <h1 class="hero-title">Elevate your<br>everyday.</h1>
                <p class="hero-subtitle">Oppdag vår eksklusive kolleksjon. Hentet direkte fra din Firebase-database.</p>
            </section>

            <section class="product-section">
                <div class="produkter">
                    <!-- her havner produktene -->
                </div>
            </section>
        </main>
    </div>

    <!-- må ha type="module" pga firebase -->
    <script type="module" src="index.js"></script>
</body>
</html>
