<!DOCTYPE html>
<html lang="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gruppeprosjekt</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- === POPUP-VINDUER === -->

    <!-- Logg inn / registrer popup -->
    <div id="loginPopup" class="popup" style="display: none;">
        <div class="popup-innhold">
            <button class="lukk-knapp">X</button>

            <!-- Innlogging -->
            <div id="loginSection">
                <h2>Logg inn</h2>
                <input type="text" id="signInEmailInput" placeholder="Brukernavn">
                <input type="password" id="signInPasswordInput" placeholder="Passord">
                <button id="signInButton">Logg inn</button>
                <p>Ingen bruker? <a href="#" id="linkToRegister">Registrer deg her</a></p>
            </div>

            <!-- Registrering -->
            <div id="registerSection" style="display: none;">
                <h2>Ny bruker</h2>
                <input type="text" id="registerEmailInput" placeholder="Brukernavn">
                <input type="text" id="registerPasswordInput" placeholder="Velg et passord">
                <button id="generatePasswordBtn">Generer tilfeldig passord</button>
                <button id="registerButton">Registrer</button>
                <p>Har du allerede bruker? <a href="#" id="linkToLogin">Logg inn her</a></p>
            </div>
        </div>
    </div>

    <!-- Rediger innlegg-popup -->
    <div id="redigerPopup" class="popup" style="display: none;">
        <div class="popup-innhold">
            <h3>Rediger innlegg</h3>
            <input type="text" id="editHeaderInput" placeholder="Overskrift">
            <textarea id="editContentInput" rows="4" placeholder="Innhold"></textarea>
            <div class="popup-knapper">
                <button id="editCancelBtn">Avbryt</button>
                <button id="editSaveBtn" style="background-color: #00cc44; color: white;">Lagre</button>
            </div>
        </div>
    </div>

    <!-- === TOPP-BAR === -->

    <header class="topp-bar">
        <div class="logo">Gruppeprosjekt</div>
        <div class="nav-knapper">
            <button id="btShowLogin">Logg inn</button>
            <button id="btLogout" style="display: none; background-color: #ff4444; color: white;">Logg ut</button>
        </div>
    </header>

    <!-- === SKRIV NYTT INNLEGG === -->

    <!-- Vises bare hvis man er innlogget (styres av JS) -->
    <section id="postFormSection" style="display: none;">
        <form id="addPostForm">
            <input type="text" id="headerInput" placeholder="Overskrift..." required>
            <textarea id="contentInput" placeholder="Hva vil du skrive?" required rows="3"></textarea>
            <button type="submit">Publiser</button>
        </form>
    </section>

    <!-- === INNLEGG === -->

    <!-- Innleggene fra Firebase havner her -->
    <div id="collection"></div>

    <script type="module" src="index.js"></script>
</body>

</html>
